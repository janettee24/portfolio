  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

content: '';\n    position: absolute;\n    top: -200px; right: -200px;\n    width: 700px; height: 700px;\n    border-radius: 50%;\n    background: radial-gradient(circle, oklch(0.76 0.17 148 / 0.07) 0%, transparent 70%);\n    pointer-events: none;\n  }\n  #hero::after {\n    content: '';\n    position: absolute;\n    bottom: -100px; left: -100px;\n    width: 500px; height: 500px;\n    border-radius: 50%;\n    background: radial-gradient(circle, oklch(0.74 0.17 58 / 0.05) 0%, transparent 70%);\n    pointer-events: none;\n  }\n\n  .hero-eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 13px;\n    font-weight: 500;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--green);\n    margin-bottom: 28px;\n  }\n  .hero-eyebrow::before {\n    content: '';\n    display: block;\n    width: 24px; height: 1px;\n    background: var(--green);\n  }\n\n  h1 {\n    font-family: var(--heading);\n    font-size: clamp(52px, 7vw, 88px);\n    font-weight: 700;\n    line-height: 1.0;\n    letter-spacing: -0.03em;\n    margin-bottom: 32px;\n    text-wrap: pretty;\n  }\n  h1 em {\n    font-style: normal;\n    color: var(--green);\n  }\n\n  .hero-desc {\n    font-size: 18px;\n    color: var(--muted);\n    max-width: 520px;\n    line-height: 1.7;\n    margin-bottom: 48px;\n    font-weight: 300;\n  }\n\n  .hero-stats {\n    display: flex;\n    gap: 48px;\n    margin-bottom: 56px;\n  }\n  .stat-item {}\n  .stat-num {\n    font-family: var(--heading);\n    font-size: 36px;\n    font-weight: 700;\n    letter-spacing: -0.03em;\n    color: var(--text);\n  }\n  .stat-num span { color: var(--green); }\n  .stat-label {\n    font-size: 12px;\n    color: var(--muted);\n    text-transform: uppercase;\n    letter-spacing: 0.08em;\n    margin-top: 2px;\n  }\n\n  .hero-cta {\n    display: flex;\n    gap: 16px;\n    flex-wrap: wrap;\n  }\n  .btn-primary {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 14px 28px;\n    background: var(--green);\n    color: #0c0c0e;\n    border-radius: 6px;\n    font-family: var(--heading);\n    font-weight: 600;\n    font-size: 15px;\n    text-decoration: none;\n    transition: opacity 0.2s, transform 0.15s;\n  }\n  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }\n  .btn-outline {\n    display: inline-flex;\n    align-items: center;\n    gap: 8px;\n    padding: 14px 28px;\n    border: 1px solid var(--border);\n    color: var(--text);\n    border-radius: 6px;\n    font-family: var(--heading);\n    font-weight: 500;\n    font-size: 15px;\n    text-decoration: none;\n    transition: border-color 0.2s, background 0.2s;\n  }\n  .btn-outline:hover { border-color: rgba(255,255,255,0.2); background: var(--surface); }\n\n  /* SECTION HEADER */\n  .section-header { margin-bottom: 64px; }\n  .section-eyebrow {\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--green);\n    margin-bottom: 16px;\n  }\n  h2 {\n    font-family: var(--heading);\n    font-size: clamp(32px, 4vw, 52px);\n    font-weight: 700;\n    letter-spacing: -0.03em;\n    line-height: 1.1;\n  }\n  .section-sub {\n    color: var(--muted);\n    font-size: 17px;\n    max-width: 480px;\n    margin-top: 16px;\n    font-weight: 300;\n  }\n\n  /* CASE STUDY CARDS */\n  .case-study {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 16px;\n    overflow: hidden;\n    margin-bottom: 32px;\n    transition: border-color 0.25s;\n  }\n  .case-study:hover { border-color: rgba(255,255,255,0.13); }\n\n  .cs-header {\n    padding: 40px 48px 32px;\n    border-bottom: 1px solid var(--border);\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 24px;\n    align-items: start;\n  }\n  .cs-tag {\n    display: inline-block;\n    padding: 4px 12px;\n    border-radius: 100px;\n    font-size: 11px;\n    font-weight: 600;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    margin-bottom: 16px;\n  }\n  .tag-gtm { background: oklch(0.76 0.17 148 / 0.12); color: var(--green); }\n  .tag-acq { background: oklch(0.74 0.17 58 / 0.12); color: var(--amber); }\n  .tag-ret { background: oklch(0.65 0.17 280 / 0.12); color: oklch(0.78 0.14 280); }\n\n  .cs-title {\n    font-family: var(--heading);\n    font-size: 26px;\n    font-weight: 700;\n    letter-spacing: -0.02em;\n    margin-bottom: 10px;\n  }\n  .cs-subtitle { color: var(--muted); font-size: 15px; font-weight: 300; }\n\n  .cs-metrics {\n    display: flex;\n    flex-direction: column;\n    align-items: flex-end;\n    gap: 8px;\n    flex-shrink: 0;\n  }\n  .metric-pill {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 100px;\n    padding: 6px 16px;\n    white-space: nowrap;\n  }\n  .metric-pill .num {\n    font-family: var(--heading);\n    font-weight: 700;\n    font-size: 18px;\n    letter-spacing: -0.02em;\n  }\n  .metric-pill .lbl { font-size: 12px; color: var(--muted); }\n  .metric-pill.green .num { color: var(--green); }\n  .metric-pill.amber .num { color: var(--amber); }\n  .metric-pill.purple .num { color: oklch(0.78 0.14 280); }\n\n  .cs-body {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n  }\n  .cs-col {\n    padding: 36px 48px;\n  }\n  .cs-col + .cs-col { border-left: 1px solid var(--border); }\n\n  .cs-col h4 {\n    font-family: var(--heading);\n    font-size: 12px;\n    font-weight: 600;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-bottom: 20px;\n  }\n\n  .cs-col ul {\n    list-style: none;\n    display: flex;\n    flex-direction: column;\n    gap: 12px;\n  }\n  .cs-col ul li {\n    display: flex;\n    align-items: flex-start;\n    gap: 10px;\n    font-size: 14px;\n    color: var(--text);\n    font-weight: 300;\n    line-height: 1.5;\n  }\n  .cs-col ul li::before {\n    content: '';\n    display: block;\n    width: 5px; height: 5px;\n    border-radius: 50%;\n    background: var(--green);\n    flex-shrink: 0;\n    margin-top: 7px;\n  }\n  .tag-acq ~ .cs-body .cs-col ul li::before { background: var(--amber); }\n\n  .result-item {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    padding: 14px 0;\n    border-bottom: 1px solid var(--border);\n  }\n  .result-item:last-child { border-bottom: none; }\n  .result-bar-wrap {\n    flex: 1;\n    height: 4px;\n    background: var(--surface2);\n    border-radius: 2px;\n    overflow: hidden;\n  }\n  .result-bar {\n    height: 100%;\n    border-radius: 2px;\n    background: var(--green);\n  }\n  .result-pct {\n    font-family: var(--heading);\n    font-weight: 700;\n    font-size: 22px;\n    letter-spacing: -0.02em;\n    width: 60px;\n    text-align: right;\n    flex-shrink: 0;\n  }\n  .result-lbl { font-size: 13px; color: var(--muted); min-width: 140px; }\n\n  /* Sub-apps inside acquisition */\n  .app-block {\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 10px;\n    padding: 20px 24px;\n    margin-bottom: 16px;\n  }\n  .app-block:last-child { margin-bottom: 0; }\n  .app-name {\n    font-family: var(--heading);\n    font-weight: 600;\n    font-size: 15px;\n    margin-bottom: 10px;\n    color: var(--amber);\n  }\n  .app-block ul li::before { background: var(--amber) !important; }\n\n  /* SKILLS */\n  .skills-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 24px;\n  }\n  .skill-card {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 12px;\n    padding: 28px 28px 24px;\n    transition: border-color 0.2s;\n  }\n  .skill-card:hover { border-color: rgba(255,255,255,0.13); }\n  .skill-icon {\n    width: 36px; height: 36px;\n    border-radius: 8px;\n    margin-bottom: 20px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 18px;\n  }\n  .skill-icon.g { background: oklch(0.76 0.17 148 / 0.1); }\n  .skill-icon.a { background: oklch(0.74 0.17 58 / 0.1); }\n  .skill-icon.p { background: oklch(0.65 0.17 280 / 0.1); }\n  .skill-card h3 {\n    font-family: var(--heading);\n    font-size: 16px;\n    font-weight: 600;\n    margin-bottom: 14px;\n  }\n  .skill-tags {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 8px;\n  }\n  .skill-tag {\n    background: var(--surface2);\n    border: 1px solid var(--border);\n    border-radius: 100px;\n    padding: 4px 12px;\n    font-size: 12px;\n    color: var(--muted);\n  }\n\n  /* FOOTER */\n  footer {\n    border-top: 1px solid var(--border);\n    padding: 48px 0;\n  }\n  .footer-inner {\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n  }\n  .footer-name {\n    font-family: var(--heading);\n    font-weight: 700;\n    font-size: 20px;\n    letter-spacing: -0.02em;\n  }\n  .footer-name span { color: var(--green); }\n  .footer-links {\n    display: flex;\n    gap: 24px;\n  }\n  .footer-links a {\n    color: var(--muted);\n    text-decoration: none;\n    font-size: 14px;\n    transition: color 0.2s;\n  }\n  .footer-links a:hover { color: var(--text); }\n\n  /* DIVIDER LINE */\n  .accent-line {\n    width: 48px;\n    height: 3px;\n    border-radius: 2px;\n    background: var(--green);\n    margin-bottom: 40px;\n  }\n\n  /* CHALLENGE BOX */\n  .challenge-box {\n    background: var(--surface2);\n    border-left: 3px solid var(--border);\n    border-radius: 0 8px 8px 0;\n    padding: 16px 20px;\n    font-size: 14px;\n    color: var(--muted);\n    font-style: italic;\n    margin-bottom: 20px;\n    font-weight: 300;\n    line-height: 1.6;\n  }\n\n  /* BADGE illust */\n  .badge-illust {\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 32px;\n  }\n  .badge {\n    width: 90px; height: 90px;\n    border-radius: 50%;\n    background: conic-gradient(var(--green) 0%, oklch(0.74 0.17 58) 100%);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 32px;\n    position: relative;\n  }\n  .badge::after {\n    content: '';\n    position: absolute;\n    inset: 4px;\n    border-radius: 50%;\n    background: var(--surface2);\n  }\n  .badge-inner { position: relative; z-index: 1; font-size: 28px; }\n\n  /* Full col spans for cs-body when 1 col layout needed */\n  .cs-body.single .cs-col {\n    grid-column: span 2;\n    border-left: none;\n  }\n  .cs-body.three {\n    grid-template-columns: 1fr 1fr 1fr;\n  }\n  .cs-body.three .cs-col + .cs-col { border-left: 1px solid var(--border); }\n\n  @media (max-width: 768px) {\n    nav { padding: 16px 24px; }\n    nav ul { display: none; }\n    .container { padding: 0 24px; }\n    section { padding: 80px 0; }\n    .cs-header { grid-template-columns: 1fr; }\n    .cs-metrics { flex-direction: row; align-items: flex-start; flex-wrap: wrap; }\n    .cs-body, .cs-body.three { grid-template-columns: 1fr; }\n    .cs-col + .cs-col { border-left: none; border-top: 1px solid var(--border); }\n    .cs-body.three .cs-col + .cs-col { border-left: none; border-top: 1px solid var(--border); }\n    .skills-grid { grid-template-columns: 1fr; }\n    .hero-stats { gap: 28px; flex-wrap: wrap; }\n    .footer-inner { flex-direction: column; gap: 20px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<nav>\n  <div class=\"nav-logo\">Duong<span>.<\u002Fspan><\u002Fdiv>\n  <ul>\n    <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n    <li><a href=\"#cases\">Case Studies<\u002Fa><\u002Fli>\n    <li><a href=\"#skills\">Skills<\u002Fa><\u002Fli>\n    <li><a href=\"#contact\">Contact<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- HERO -->\n<section id=\"hero\">\n  <div class=\"container\">\n    <div class=\"hero-eyebrow\">Growth Specialist<\u002Fdiv>\n    <h1>I turn<br>installs into<br><em>revenue.<\u002Fem><\u002Fh1>\n    <p class=\"hero-desc\">\n      Growth specialist focused on Shopify app ecosystems — driving user acquisition, optimizing conversion, and building retention loops that compound.\n    <\u002Fp>\n    <div class=\"hero-stats\">\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">4<span> apps<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">Launched on Shopify<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">40<span>%<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">Market penetration<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">+25<span>%<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">Page view growth<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"stat-item\">\n        <div class=\"stat-num\">+20<span>%<\u002Fspan><\u002Fdiv>\n        <div class=\"stat-label\">Engagement lift<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-cta\">\n      <a href=\"#cases\" class=\"btn-primary\">View Case Studies →<\u002Fa>\n      <a href=\"mailto:duong@example.com\" class=\"btn-outline\">Get in touch<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT -->\n<section id=\"about\" style=\"padding-top: 0;\">\n  <div class=\"container\">\n    <div class=\"accent-line\"><\u002Fdiv>\n    <div class=\"section-header\">\n      <div class=\"section-eyebrow\">About<\u002Fdiv>\n      <h2>Building growth systems<br>in competitive markets<\u002Fh2>\n      <p class=\"section-sub\">I work at the intersection of product, data, and marketing to grow apps in saturated environments where organic ranking and retention are everything.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 700px;\">\n      <div style=\"background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px;\">\n        <div style=\"color: var(--green); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;\">Focus area<\u002Fdiv>\n        <div style=\"font-family: var(--heading); font-size: 17px; font-weight: 600;\">Shopify App Ecosystem<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 24px;\">\n        <div style=\"color: var(--amber); font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;\">Specialty<\u002Fdiv>\n        <div style=\"font-family: var(--heading); font-size: 17px; font-weight: 600;\">SMB SaaS Growth Loops<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CASE STUDIES -->\n<section id=\"cases\">\n  <div class=\"container\">\n    <div class=\"section-header\">\n      <div class=\"section-eyebrow\">Case Studies<\u002Fdiv>\n      <h2>Growth work,<br>by the numbers<\u002Fh2>\n    <\u002Fdiv>\n\n    <!-- GTM -->\n    <div class=\"case-study\">\n      <div class=\"cs-header\">\n        <div>\n          <div class=\"cs-tag tag-gtm\">Go-to-Market<\u002Fdiv>\n          <div class=\"cs-title\">Launching 4 Shopify Apps in a Saturated Market<\u002Fdiv>\n          <div class=\"cs-subtitle\">Target: small-to-medium merchants managing large inventories needing volume discount &amp; bundling tools<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-metrics\">\n          <div class=\"metric-pill green\">\n            <span class=\"num\">40%<\u002Fspan><span class=\"lbl\">Market penetration<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-pill green\">\n            <span class=\"num\">4<\u002Fspan><span class=\"lbl\">Apps launched<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-body\">\n        <div class=\"cs-col\">\n          <h4>The Challenge<\u002Fh4>\n          <div class=\"challenge-box\">\n            \"The domain is highly competitive — established apps with 1,000+ reviews, free plans, and locked first-page keyword rankings. Breaking through required a differentiated strategy.\"\n          <\u002Fdiv>\n          <ul>\n            <li>Incumbent apps dominant across all target keywords<\u002Fli>\n            <li>Free plan landscape raises CAC and LTV bar<\u002Fli>\n            <li>Merchants loyal to existing tools with social proof<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"cs-col\">\n          <h4>GTM Approach<\u002Fh4>\n          <ul>\n            <li>Identified underserved SMB segment: merchants with large SKU counts needing capital recovery<\u002Fli>\n            <li>Positioned apps around bundling + quantity breaks to solve a specific pain: stock clearance<\u002Fli>\n            <li>Launched with freemium to reduce friction; monetization via premium features<\u002Fli>\n            <li>Sequenced launches to build Shopify ecosystem presence and cross-app referral surface<\u002Fli>\n            <li>Competitor benchmarking to find review gaps and UX weaknesses to exploit<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ACQUISITION -->\n    <div class=\"case-study\">\n      <div class=\"cs-header\">\n        <div>\n          <div class=\"cs-tag tag-acq\">User Acquisition<\u002Fdiv>\n          <div class=\"cs-title\">Driving Organic &amp; Paid Growth for BOGO+ and SnapBundle<\u002Fdiv>\n          <div class=\"cs-subtitle\">Multi-channel acquisition strategy across two flagship apps in the volume discount vertical<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-metrics\">\n          <div class=\"metric-pill amber\">\n            <span class=\"num\">+25%<\u002Fspan><span class=\"lbl\">Page views (BOGO+)<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-pill amber\">\n            <span class=\"num\">+16%<\u002Fspan><span class=\"lbl\">Active users (BOGO+)<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-pill amber\">\n            <span class=\"num\">+20%<\u002Fspan><span class=\"lbl\">Growth M1 (SnapBundle)<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-body\">\n        <div class=\"cs-col\">\n          <h4>BOGO+ | Buy X Get Y Free Gift<\u002Fh4>\n          <div class=\"app-block\">\n            <div class=\"app-name\">Tactics<\u002Fdiv>\n            <ul>\n              <li>Session recording tools to map merchant behavior and optimize app listing UX<\u002Fli>\n              <li>GA4 channel analysis to identify high-converting keyword and traffic sources<\u002Fli>\n              <li>Partnership program to drive co-marketing installs<\u002Fli>\n              <li>Guest blogs and backlink building for Shopify app store SEO authority<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div style=\"display: flex; flex-direction: column; gap: 0; margin-top: 8px;\">\n            <div class=\"result-item\">\n              <div class=\"result-lbl\" style=\"color: var(--text); font-size:13px;\">Page views<\u002Fdiv>\n              <div class=\"result-bar-wrap\"><div class=\"result-bar\" style=\"width:25%; background: var(--amber);\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"result-pct\" style=\"color: var(--amber);\">+25%<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"result-item\">\n              <div class=\"result-lbl\" style=\"color: var(--text); font-size:13px;\">Active users<\u002Fdiv>\n              <div class=\"result-bar-wrap\"><div class=\"result-bar\" style=\"width:16%; background: var(--amber);\"><\u002Fdiv><\u002Fdiv>\n              <div class=\"result-pct\" style=\"color: var(--amber);\">+16%<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-col\">\n          <h4>SnapBundle: Volume Discounts<\u002Fh4>\n          <div class=\"app-block\">\n            <div class=\"app-name\">Tactics<\u002Fdiv>\n            <ul>\n              <li>Keyword analysis and listing optimization using GA4 search data<\u002Fli>\n              <li>Shopify ads targeting competitor app audiences directly<\u002Fli>\n              <li>Early review strategy to build social proof and boost ranking velocity<\u002Fli>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div style=\"margin-top: 20px;\">\n            <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 16px;\">Month 1 Results<\u002Fdiv>\n            <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px;\">\n              <div style=\"background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center;\">\n                <div style=\"font-family: var(--heading); font-size: 28px; font-weight: 700; color: var(--amber); letter-spacing: -0.03em;\">20%<\u002Fdiv>\n                <div style=\"font-size: 12px; color: var(--muted); margin-top: 4px;\">User growth<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center;\">\n                <div style=\"font-family: var(--heading); font-size: 28px; font-weight: 700; color: var(--amber); letter-spacing: -0.03em;\">3 ★<\u002Fdiv>\n                <div style=\"font-size: 12px; color: var(--muted); margin-top: 4px;\">5-star reviews<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RETENTION -->\n    <div class=\"case-study\">\n      <div class=\"cs-header\">\n        <div>\n          <div class=\"cs-tag tag-ret\">User Retention<\u002Fdiv>\n          <div class=\"cs-title\">Gamification to Convert Freemium Users to Paid<\u002Fdiv>\n          <div class=\"cs-subtitle\">Designed a behavioral engagement loop to move 70% freemium base toward paid conversion<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"cs-metrics\">\n          <div class=\"metric-pill purple\">\n            <span class=\"num\">+2%<\u002Fspan><span class=\"lbl\">Paid conversion<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"metric-pill purple\">\n            <span class=\"num\">+20%<\u002Fspan><span class=\"lbl\">Total engagement<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"cs-body\">\n        <div class=\"cs-col\">\n          <h4>Problem Context<\u002Fh4>\n          <div class=\"challenge-box\">\n            \"70% of installs were on the free plan. Revenue targets required converting ~20% to paid. The app needed a reason to keep merchants coming back — and a nudge to upgrade.\"\n          <\u002Fdiv>\n          <ul>\n            <li>Large freemium base with low upgrade motivation<\u002Fli>\n            <li>Merchants lacked visibility into their own sales progress<\u002Fli>\n            <li>No emotional connection or milestone celebration in the UX<\u002Fli>\n            <li>Needed a low-friction path from engagement to upgrade intent<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"cs-col\">\n          <h4>Gamification Initiative<\u002Fh4>\n          <div class=\"badge-illust\">\n            <div style=\"text-align: center;\">\n              <div style=\"display: flex; gap: 16px; justify-content: center; margin-bottom: 12px;\">\n                <div style=\"width: 64px; height: 64px; border-radius: 50%; background: conic-gradient(var(--green) 0deg, oklch(0.74 0.17 58) 120deg, oklch(0.65 0.17 280) 240deg, var(--green) 360deg); display: flex; align-items: center; justify-content: center; position: relative;\">\n                  <div style=\"position: absolute; inset: 4px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px;\">🥇<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width: 64px; height: 64px; border-radius: 50%; background: conic-gradient(var(--amber) 0deg, oklch(0.76 0.17 148) 180deg, var(--amber) 360deg); display: flex; align-items: center; justify-content: center; position: relative; opacity: 0.6;\">\n                  <div style=\"position: absolute; inset: 4px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px;\">🥈<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"width: 64px; height: 64px; border-radius: 50%; background: conic-gradient(oklch(0.65 0.17 280) 0deg, var(--green) 180deg, oklch(0.65 0.17 280) 360deg); display: flex; align-items: center; justify-content: center; position: relative; opacity: 0.4;\">\n                  <div style=\"position: absolute; inset: 4px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 22px;\">🥉<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size: 12px; color: var(--muted);\">Order milestone badges<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <ul>\n            <li>Badge system awarded at order volume milestones, creating pride and habit<\u002Fli>\n            <li>In-app sales dashboard gave merchants real-time progress visibility<\u002Fli>\n            <li>Badge tiers unlocked only on paid plan — creating organic upgrade pull<\u002Fli>\n            <li>Emotional satisfaction loop: achievement → celebration → action<\u002Fli>\n          <\u002Ful>\n          <div style=\"margin-top: 20px; display: flex; gap: 8px;\">\n            <div style=\"flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center;\">\n              <div style=\"font-family: var(--heading); font-size: 22px; font-weight: 700; color: oklch(0.78 0.14 280);\">+2%<\u002Fdiv>\n              <div style=\"font-size: 11px; color: var(--muted); margin-top: 2px
